services:
  db:
    image: postgres:16
    ports:
      - "5432:5432"
    env_file: .env
    volumes: 
      - "volume:/var/lib/postgresql/data"
    healthcheck: 
      test: pg_isready -U test_user -d test_base
      interval: 10s
      timeout: 3s
      retries: 3
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
  
volumes:
  volume: {}